appId: com.sepi4.mycelo
productName: myCelo
copyright: Copyright © 2024 Sergei Polishsuk

directories:
    output: dist
    buildResources: assets

files:
    - out/**
    - countries.json
    - src/assets/img/**
    - assets/**

extraResources:
    - from: localhostFiles/
      to: localhostFiles/
      filter:
          - rankings.css
          - rankings.html
          - rankings.js

win:
    target:
        - target: nsis
          arch: [x64]
    icon: assets/icon/icon.ico
    maintainer: myCelo

linux:
    target:
        - target: deb
          arch: [x64]
        - target: AppImage
          arch: [x64]
    icon: assets/icon/icon.png
    maintainer: myCelo

nsis:
    oneClick: false
    allowToChangeInstallationDirectory: true
